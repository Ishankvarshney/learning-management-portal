<div class="card shadow-sm border-0">

    <div class="card-body p-4">

        <h3 class="mb-4 text-center">
            Sign In
        </h3>

        <form>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email" class="form-control" [ngModel]="email()" (ngModelChange)="email.set($event)"
                    name="email">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password" class="form-control" [ngModel]="password()"
                    (ngModelChange)="password.set($event)" name="password">

            </div>

            <div class="d-flex justify-content-between mb-4">

                <div class="form-check">

                    <input class="form-check-input" type="checkbox">

                    <label class="form-check-label">
                        Remember Me
                    </label>

                </div>

                <a routerLink="/forgot-password">
                    Forgot Password?
                </a>

            </div>

            <button class="btn btn-primary w-100" type="button" (click)="login()">

                Login

            </button>

        </form>

    </div>

</div>
